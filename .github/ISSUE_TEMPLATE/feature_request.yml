name: Feature request
description: Suggest a finding type, output field, or workflow improvement.
title: "Feature: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What debugging or CI workflow should Sounder improve?
    validations:
      required: true
  - type: textarea
    id: proposed
    attributes:
      label: Proposed behavior
      description: Describe the command, output, or finding you want.
    validations:
      required: true
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - File inspect
        - Dataset check
        - S3 support
        - Agent/CI output
        - Packaging/install
        - Other
    validations:
      required: true
  - type: textarea
    id: examples
    attributes:
      label: Example output or command
      render: shell
