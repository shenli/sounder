name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: install musl toolchain
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - run: cargo build --release --locked --target ${{ matrix.target }}
      - name: package
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/sounder" "dist/sounder-${{ matrix.target }}"
          tar -C dist -czf "dist/sounder-${{ matrix.target }}.tar.gz" "sounder-${{ matrix.target }}"
          shasum -a 256 "dist/sounder-${{ matrix.target }}.tar.gz" > "dist/sounder-${{ matrix.target }}.tar.gz.sha256"
      - name: smoke packaged binary
        shell: bash
        run: |
          mkdir -p smoke
          tar -C smoke -xzf "dist/sounder-${{ matrix.target }}.tar.gz"
          ./smoke/sounder-${{ matrix.target }} version
      - uses: actions/upload-artifact@v4
        with:
          name: sounder-${{ matrix.target }}
          path: dist/*

  publish:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
